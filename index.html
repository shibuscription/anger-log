<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>アンガーログ & べきログ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#ff7043" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="アンガーログ" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
</head>

<body>
  <header class="topbar">
    <div id="appTitle" class="topbar-title">アンガーログ</div>
    <div id="userMenuWrap" class="user-menu-wrap hidden">
      <button
        id="userMenuButton"
        type="button"
        class="user-menu-button"
        aria-haspopup="menu"
        aria-expanded="false"
        aria-label="ユーザーメニューを開く"
      >
        <img id="userAvatarImage" class="user-avatar-image hidden" alt="" />
        <span id="userAvatarFallback" class="user-avatar-fallback" aria-hidden="true">人</span>
      </button>
      <div id="userMenuPopover" class="user-menu-popover hidden" role="menu" aria-label="ユーザー情報">
        <div class="user-menu-info">
          <strong id="userMenuName">ユーザー</strong>
          <span id="userMenuEmail">email@example.com</span>
        </div>
        <button id="userMenuLogoutButton" type="button" class="user-menu-logout" role="menuitem">
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <main>
    <section id="authCard" class="auth-card">
      <div class="auth-row">
        <div class="auth-user">
          <strong id="authPrimaryText">ログイン状態を確認しています</strong>
          <span id="authSecondaryText">少し待つと利用可能になります。</span>
        </div>
        <button id="authActionButton" type="button" class="inline-button">読み込み中</button>
      </div>
      <div id="authStatusText" class="small-text status-text">
        Google ログイン後、自分のアンガーログだけを読み書きできます。
      </div>
    </section>

    <section id="authGate" class="gate-card hidden">
      <h2>Google ログインで使うアプリです</h2>
      <p>
        アンガーログは個人用の記録を扱うため、ログインしている本人のデータだけを表示します。
        未ログインの状態では、登録・一覧・編集機能は利用できません。
      </p>
      <button id="gateLoginButton" type="button" class="primary">Google でログイン</button>
    </section>

    <section id="appShell" class="hidden">
      <section id="screen-new">
        <div class="small-text" id="nowText"></div>

        <div class="section-title">場所</div>
        <input type="text" id="place" placeholder="例：職場・自宅・車の中など" />

        <button id="locationButton" type="button" class="secondary location-button">
          現在地から位置情報を記録する
        </button>
        <div id="locationInfo" class="small-text location-info">
          ※位置情報は未取得
        </div>

        <div class="section-title">出来事</div>
        <textarea id="event" placeholder="例：上司に急に予定変更を言われた"></textarea>

        <div class="section-title">怒りの強さ（1〜10）</div>
        <input type="range" id="intensity" min="1" max="10" value="5" />
        <div class="small-text">
          強さ：<span id="intensityValue">5</span>/10
        </div>

        <button id="saveButton" type="button" class="primary">
          この怒りを記録する
        </button>
      </section>

      <section id="screen-list" class="hidden">
        <div class="section-title">最近のアンガーログ</div>
        <div class="small-text">新しい順に表示します</div>
        <div id="listContainer" class="screen-block"></div>
      </section>

      <section id="screen-reflect" class="hidden">
        <div id="reflectContent"></div>
      </section>
    </section>
  </main>

  <div id="bottomNav" class="bottom-nav hidden">
    <button id="nav-new" class="nav-button active" type="button" aria-label="記録">
      <span class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M7 4.5h7.5L18 8v11a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 6 19V6A1.5 1.5 0 0 1 7.5 4.5Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" />
          <path d="M14.5 4.5V8H18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" />
          <path d="M9 12h6M12 9v6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8" />
        </svg>
      </span>
      <span class="nav-label">記録</span>
    </button>
    <button id="nav-list" class="nav-button" type="button" aria-label="一覧">
      <span class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M8 7h9M8 12h9M8 17h9" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8" />
          <circle cx="5.25" cy="7" r="1.25" fill="currentColor" />
          <circle cx="5.25" cy="12" r="1.25" fill="currentColor" />
          <circle cx="5.25" cy="17" r="1.25" fill="currentColor" />
        </svg>
      </span>
      <span class="nav-label">一覧</span>
    </button>
    <button id="nav-reflect" class="nav-button" type="button" aria-label="ふりかえり">
      <span class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M7.5 6.5h9A2.5 2.5 0 0 1 19 9v4.5A2.5 2.5 0 0 1 16.5 16H12l-3.5 2.5V16h-1A2.5 2.5 0 0 1 5 13.5V9a2.5 2.5 0 0 1 2.5-2.5Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" />
          <path d="M9.25 11.5 11 13l3.75-3.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" />
        </svg>
        <span id="nav-reflect-badge" class="nav-badge hidden" aria-hidden="true">0</span>
      </span>
      <span class="nav-label">ふりかえり</span>
    </button>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
